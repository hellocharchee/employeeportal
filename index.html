<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charchee Strategic Command Center</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
    .font-cursive { font-family: 'Dancing Script', cursive; }
    @media print {
      body { background: white; color: black; }
      .print\:hidden { display: none !important; }
      .print\:block { display: block !important; }
      @page { margin: 1cm; size: landscape; }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-cyan-500/30">
  
  <div id="protocol-warning" style="display: none;" class="bg-rose-600 text-white p-4 text-center font-bold text-sm shadow-lg relative z-50">
    LOCAL FILE DETECTED: This app uses ES Modules and won't work by double-clicking the file. Please host it on GitHub Pages or use a local web server (like VS Code Live Server).
  </div>
  <script>
    if (window.location.protocol === 'file:') {
      document.getElementById('protocol-warning').style.display = 'block';
    }
  </script>

  <div id="root"></div>

  <!-- Note data-type="module" allows ES imports inside Babel scripts -->
  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    
    // Lucide Icons
    import * as LucideIcons from 'https://esm.sh/lucide-react@0.292.0';
    const { 
      Lock, Unlock, Mail, Target, Save, FileText, ChevronRight, Activity, Globe, Send, 
      Home, Building, Utensils, Key, Map, Printer, MapPin, UserPlus, Trash2, User, 
      AtSign, ChevronDown, ChevronUp, Maximize2, X, QrCode, Download, Upload
    } = LucideIcons;

    // --- CONSTANTS ---
    const US_STATES = [
      "AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA",
      "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD",
      "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ",
      "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC",
      "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY"
    ];

    const STATE_NAMES = {
      AL: 'Alabama', AK: 'Alaska', AZ: 'Arizona', AR: 'Arkansas', CA: 'California',
      CO: 'Colorado', CT: 'Connecticut', DE: 'Delaware', FL: 'Florida', GA: 'Georgia',
      HI: 'Hawaii', ID: 'Idaho', IL: 'Illinois', IN: 'Indiana', IA: 'Iowa',
      KS: 'Kansas', KY: 'Kentucky', LA: 'Louisiana', ME: 'Maine', MD: 'Maryland',
      MA: 'Massachusetts', MI: 'Michigan', MN: 'Minnesota', MS: 'Mississippi', MO: 'Missouri',
      MT: 'Montana', NE: 'Nebraska', NV: 'Nevada', NH: 'New Hampshire', NJ: 'New Jersey',
      NM: 'New Mexico', NY: 'New York', NC: 'North Carolina', ND: 'North Dakota', OH: 'Ohio',
      OK: 'Oklahoma', OR: 'Oregon', PA: 'Pennsylvania', RI: 'Rhode Island', SC: 'South Carolina',
      SD: 'South Dakota', TN: 'Tennessee', TX: 'Texas', UT: 'Utah', VT: 'Vermont',
      VA: 'Virginia', WA: 'Washington', WV: 'West Virginia', WI: 'Wisconsin', WY: 'Wyoming'
    };

    // Tactical Coordinates for the Radar Map (Percentage based x: left, y: top)
    const STATE_COORDS = {
      WA: {x: 12, y: 10}, OR: {x: 10, y: 25}, CA: {x: 8, y: 50},
      ID: {x: 20, y: 20}, NV: {x: 18, y: 40}, UT: {x: 25, y: 45}, AZ: {x: 22, y: 60},
      MT: {x: 30, y: 15}, WY: {x: 32, y: 30}, CO: {x: 35, y: 48}, NM: {x: 32, y: 65},
      ND: {x: 45, y: 18}, SD: {x: 45, y: 30}, NE: {x: 48, y: 45}, KS: {x: 50, y: 55}, OK: {x: 50, y: 68}, TX: {x: 48, y: 85},
      MN: {x: 55, y: 20}, IA: {x: 58, y: 35}, MO: {x: 60, y: 52}, AR: {x: 60, y: 68}, LA: {x: 60, y: 85},
      WI: {x: 65, y: 22}, IL: {x: 65, y: 42}, MI: {x: 72, y: 25}, IN: {x: 70, y: 45}, OH: {x: 75, y: 42}, KY: {x: 72, y: 55}, TN: {x: 70, y: 65}, MS: {x: 68, y: 78}, AL: {x: 73, y: 78},
      FL: {x: 85, y: 92}, GA: {x: 78, y: 75}, SC: {x: 83, y: 68}, NC: {x: 85, y: 60}, VA: {x: 85, y: 52}, WV: {x: 80, y: 48},
      MD: {x: 88, y: 48}, DE: {x: 92, y: 48}, PA: {x: 85, y: 38}, NJ: {x: 92, y: 40}, NY: {x: 88, y: 25},
      CT: {x: 94, y: 32}, RI: {x: 96, y: 30}, MA: {x: 95, y: 25}, VT: {x: 90, y: 18}, NH: {x: 94, y: 18}, ME: {x: 96, y: 8},
      AK: {x: 10, y: 85}, HI: {x: 25, y: 90}
    };

    // Tactical Low-Poly US Outline Map (ViewBox: 0 0 1000 600)
    const TACTICAL_OUTLINE_SVG = "M120,50 L300,70 L450,60 L550,100 L600,120 L650,200 L700,180 L750,150 L850,100 L900,30 L950,60 L920,200 L880,350 L820,450 L800,550 L750,500 L700,480 L650,480 L550,550 L450,500 L400,400 L200,350 L100,300 L80,200 L100,100 Z M50,450 L150,450 L200,500 L100,550 Z M250,500 L300,520 L280,550 L230,530 Z";

    const CATEGORIES = [
      { id: 'airbnb', name: 'Airbnb (STR)', icon: Home },
      { id: 'hotels', name: 'Hotels', icon: Building },
      { id: 'fnb', name: 'Food & Beverage', icon: Utensils },
      { id: 'realestate', name: 'Real Estate', icon: Key }
    ];

    function App() {
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [loginError, setLoginError] = useState('');
      const [isCheckingAccess, setIsCheckingAccess] = useState(true);
      const [isUnlocking, setIsUnlocking] = useState(false);

      const [outreachData, setOutreachData] = useState({});
      const [selectedState, setSelectedState] = useState('CA');
      const [localStateData, setLocalStateData] = useState({ contacts: [] });
      const [isSaving, setIsSaving] = useState(false);
      
      const [newContact, setNewContact] = useState({ name: '', location: '', email: '', category: 'airbnb' });
      const [openSections, setOpenSections] = useState({ goals: false, targets: false, comms: false, notes: false, qr: false });
      const [isEmailModalOpen, setIsEmailModalOpen] = useState(false);
      const [notification, setNotification] = useState(null);

      const inputRef = useRef(null);

      // 1. Initialize Local State (Replaces Firebase)
      useEffect(() => {
        try {
          // Disabled auto-unlock for development so you can test the lock screen
          // const savedAccess = localStorage.getItem('charchee_unlocked');
          // if (savedAccess === 'true') {
          //   setIsUnlocked(true);
          // }
          
          // Load saved tactical data
          const savedData = localStorage.getItem('charchee_data');
          if (savedData) {
            setOutreachData(JSON.parse(savedData));
          }
        } catch (e) {
          console.error("Local storage initialization error:", e);
        } finally {
          setIsCheckingAccess(false);
        }
      }, []);

      // Auto-focus the pin input when the app loads or returns to lock screen
      useEffect(() => {
        if (!isCheckingAccess && !isUnlocked && inputRef.current) {
          // Slight delay ensures the DOM is fully ready before focusing
          setTimeout(() => {
            inputRef.current?.focus();
          }, 100);
        }
      }, [isCheckingAccess, isUnlocked]);

      // 2. Update local form state when selected state changes
      useEffect(() => {
        setLocalStateData(outreachData[selectedState] || {});
      }, [selectedState, outreachData]);

      // --- HANDLERS ---
      const showNotification = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(null), 3000);
      };

      const handleExport = () => {
        const dataStr = JSON.stringify(outreachData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `charchee_backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showNotification("Backup saved to your device.");
      };

      const handleImport = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const importedData = JSON.parse(e.target.result);
            setOutreachData(importedData);
            localStorage.setItem('charchee_data', JSON.stringify(importedData));
            setLocalStateData(importedData[selectedState] || { contacts: [] });
            showNotification("Memory restored successfully.");
          } catch (error) {
            console.error("Import failed:", error);
            showNotification("Error: Corrupted or invalid save file.");
          }
        };
        reader.readAsText(file);
        event.target.value = null; // Reset input so you can re-import the same file if needed
      };

      const handlePinChange = (e) => {
        const val = e.target.value.replace(/\D/g, ''); // Ensure only numbers
        if (val.length <= 4) {
          setPasswordInput(val);
          setLoginError('');
        }
        
        if (val.length === 4) {
          if (val === '1989') {
            setIsUnlocking(true);
            // Sequence the animation: spin for 1s, then expand/fade, then unlock
            setTimeout(() => {
              setIsUnlocked(true);
              setIsUnlocking(false);
              // localStorage.setItem('charchee_unlocked', 'true'); // Disabled for testing
              setPasswordInput('');
            }, 1800); 
          } else {
            setLoginError('INVALID PIN');
            setTimeout(() => {
              setPasswordInput('');
              setLoginError('');
            }, 800);
          }
        }
      };

      const handleLocalChange = (field, value) => {
        setLocalStateData(prev => ({ ...prev, [field]: value }));
      };

      const handleAddContact = () => {
        if (!newContact.name) return;
        const contact = { ...newContact, id: Date.now().toString() };
        setLocalStateData(prev => ({
          ...prev,
          contacts: [...(prev.contacts || []), contact]
        }));
        setNewContact({ name: '', location: '', email: '', category: 'airbnb' });
      };

      const handleRemoveContact = (id) => {
        setLocalStateData(prev => ({
          ...prev,
          contacts: (prev.contacts || []).filter(c => c.id !== id)
        }));
      };

      const saveStateData = () => {
        if (!selectedState) return;
        setIsSaving(true);
        
        const updatedLocalData = {
          ...localStateData,
          lastUpdated: new Date().toISOString()
        };
        
        const newOutreachData = {
          ...outreachData,
          [selectedState]: updatedLocalData
        };
        
        // Save to state and local storage
        setOutreachData(newOutreachData);
        localStorage.setItem('charchee_data', JSON.stringify(newOutreachData));
        
        // Quick delay for visual feedback of saving
        setTimeout(() => setIsSaving(false), 300);
      };

      const handleStateSwitch = (newState) => {
        if (newState === selectedState) return;
        saveStateData();
        setSelectedState(newState);
      };

      const toggleSection = (section) => {
        setOpenSections(prev => ({ ...prev, [section]: !prev[section] }));
      };

      const launchEmailClient = () => {
        const to = localStateData.draftTo || '';
        const subject = encodeURIComponent(localStateData.draftSubject || '');
        const body = encodeURIComponent(localStateData.draftBody || '');
        window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
      };

      // --- COMPUTATIONS ---
      const { totalSent, totalGoal } = useMemo(() => {
        let sent = 0;
        let goal = 0;
        Object.values(outreachData).forEach(state => {
          CATEGORIES.forEach(cat => {
            sent += (state[`${cat.id}_sent`] || 0);
            goal += (state[`${cat.id}_goal`] || 0);
          });
        });
        return { totalSent: sent, totalGoal: goal };
      }, [outreachData]);

      const progressPercentage = totalGoal > 0 ? Math.min(100, Math.round((totalSent / totalGoal) * 100)) : 0;

      const getChipColor = (stateId) => {
        const data = outreachData[stateId];
        if (!data) return 'bg-slate-900/80 text-slate-500 border-slate-800 hover:bg-slate-800 hover:border-cyan-900';
        
        let stateSent = 0;
        let stateGoal = 0;
        CATEGORIES.forEach(cat => {
          stateSent += (data[`${cat.id}_sent`] || 0);
          stateGoal += (data[`${cat.id}_goal`] || 0);
        });
        
        if (stateSent === 0) return 'bg-slate-900/80 text-slate-500 border-slate-800 hover:bg-slate-800 hover:border-cyan-900';
        if (stateSent >= stateGoal && stateGoal > 0) return 'bg-cyan-950/90 text-cyan-300 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.6)] hover:bg-cyan-900';
        return 'bg-blue-950/90 text-blue-300 border-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.5)] hover:bg-blue-900';
      };

      const handlePrint = () => {
        window.print();
      };

      // --- RENDER LOGIC ---
      if (isCheckingAccess) {
        return (
          <div className="min-h-screen bg-slate-950 flex items-center justify-center text-cyan-500">
            <Activity className="animate-spin mr-3" /> Booting Command Center...
          </div>
        );
      }

      if (!isUnlocked) {
        return (
          <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4 overflow-hidden">
            <div 
              className={`relative w-72 h-72 sm:w-80 sm:h-80 rounded-full flex flex-col items-center justify-center transition-all duration-700 ease-in-out cursor-pointer ${isUnlocking ? 'scale-125 opacity-0' : 'scale-100 opacity-100'}`} 
              style={{ transitionDelay: isUnlocking ? '1s' : '0s' }}
              onClick={() => inputRef.current?.focus()}
            >
              
              {/* Base Circle Background - Metallic Outer Ring */}
              <div className="absolute inset-0 rounded-full bg-gradient-to-br from-slate-400 via-slate-700 to-slate-900 border-2 border-slate-500 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3),0_15px_35px_rgba(0,0,0,0.8)]">
                {/* Inner Metallic Plate */}
                <div className="absolute inset-3 rounded-full bg-gradient-to-tl from-slate-950 via-slate-800 to-slate-700 border border-slate-900 shadow-[inset_0_10px_20px_rgba(0,0,0,0.8)] flex items-center justify-center">
                   {/* Subtle metallic texture/ring inside */}
                   <div className="absolute inset-8 rounded-full border border-slate-700/50 pointer-events-none"></div>
                   <div className="absolute inset-16 rounded-full border border-slate-700/30 pointer-events-none"></div>
                </div>
              </div>
              
              {/* Animated Glowing Ring (Active during unlock) */}
              {isUnlocking && (
                <div className="absolute inset-[-4px] rounded-full border-4 border-transparent border-t-cyan-400 border-r-cyan-400 animate-spin shadow-[0_0_30px_rgba(34,211,238,0.8)] z-0" style={{ animationDuration: '0.8s' }}></div>
              )}
              
              {/* Content */}
              <div className={`relative z-10 flex flex-col items-center transition-opacity duration-300 ${isUnlocking ? 'opacity-0' : 'opacity-100'}`}>
                <div className="w-12 h-12 bg-gradient-to-b from-slate-700 to-slate-900 rounded-full flex items-center justify-center border border-slate-500 shadow-[0_2px_10px_rgba(0,0,0,0.5),inset_0_1px_1px_rgba(255,255,255,0.2)] mb-4">
                  <Lock className="w-5 h-5 text-cyan-400 drop-shadow-[0_0_3px_rgba(34,211,238,0.8)]" />
                </div>
                
                <h1 className="text-3xl font-bold text-center text-slate-100 mb-1 font-cursive drop-shadow-[0_0_8px_rgba(6,182,212,0.6)]">Hello Charchee</h1>
                <p className="text-cyan-500/70 text-[10px] mb-6 font-sans tracking-[0.2em] uppercase font-bold drop-shadow-md">Employee Portal</p>
                
                {/* 4 PIN Dots */}
                <div className="flex gap-4 mb-2 relative">
                  {[0, 1, 2, 3].map(i => (
                    <div key={i} className={`w-3.5 h-3.5 rounded-full border-2 transition-all duration-200 ${passwordInput.length > i ? 'bg-cyan-400 border-cyan-400 shadow-[0_0_12px_rgba(34,211,238,0.9)] scale-110' : 'bg-slate-900 border-slate-600 shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)]'}`}></div>
                  ))}
                  
                  {/* Invisible Input Overlay */}
                  <input
                    ref={inputRef}
                    type="password"
                    inputMode="numeric"
                    maxLength={4}
                    value={passwordInput}
                    onChange={handlePinChange}
                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20 outline-none bg-transparent text-transparent"
                    autoComplete="off"
                  />
                </div>

                {/* Error Message */}
                <div className="h-6 mt-3">
                  {loginError && (
                    <span className="text-rose-400 text-xs font-bold animate-pulse tracking-widest drop-shadow-[0_0_5px_rgba(244,63,94,0.6)]">{loginError}</span>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Top Navigation / Header */}
          <header className="bg-slate-900 border-b border-cyan-900/50 sticky top-0 z-10 shadow-[0_0_20px_rgba(6,182,212,0.1)] print:hidden">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-slate-950 border border-cyan-500/50 p-2 rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                  <Globe className="w-6 h-6 text-cyan-400" />
                </div>
                <div>
                  <h1 className="text-3xl font-bold text-slate-100 tracking-tight font-cursive drop-shadow-[0_0_5px_rgba(6,182,212,0.5)]">Hello Charchee</h1>
                  <p className="text-xs text-cyan-500/70 font-medium -mt-1 font-sans">Employee Portal &bull; Superior Clarity</p>
                </div>
              </div>
              
              <div className="flex items-center gap-6 bg-slate-950 px-6 py-2 rounded-full border border-cyan-900/50 shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
                <div className="flex flex-col items-end">
                  <span className="text-xs text-slate-500 font-semibold uppercase tracking-wider">Total Sent</span>
                  <span className="text-lg font-bold text-slate-100">{totalSent.toLocaleString()}</span>
                </div>
                <div className="w-px h-8 bg-slate-800"></div>
                <div className="flex flex-col">
                  <span className="text-xs text-slate-500 font-semibold uppercase tracking-wider">Target</span>
                  <span className="text-lg font-bold text-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.5)]">{totalGoal.toLocaleString()}</span>
                </div>
                
                <div className="hidden sm:flex items-center ml-4">
                  <div className="w-32 h-2 bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                    <div 
                      className="h-full bg-cyan-500 transition-all duration-500 ease-out shadow-[0_0_10px_#06b6d4]" 
                      style={{ width: `${progressPercentage}%` }}
                    ></div>
                  </div>
                  <span className="ml-3 text-xs font-bold text-cyan-300">{progressPercentage}%</span>
                </div>
              </div>

              <div className="flex items-center gap-2">
                <input 
                  type="file" 
                  id="import-save" 
                  accept=".json" 
                  className="hidden" 
                  onChange={handleImport} 
                />
                <button 
                  onClick={() => document.getElementById('import-save').click()}
                  className="hidden sm:flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-emerald-400 px-3 py-2 rounded-lg text-sm font-semibold transition-colors border border-emerald-900/50 hover:border-emerald-500 hover:shadow-[0_0_10px_rgba(16,185,129,0.3)]"
                  title="Upload Save File"
                >
                  <Upload className="w-4 h-4" /> Restore
                </button>
                <button 
                  onClick={handleExport}
                  className="hidden sm:flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-cyan-400 px-3 py-2 rounded-lg text-sm font-semibold transition-colors border border-cyan-900/50 hover:border-cyan-500 hover:shadow-[0_0_10px_rgba(6,182,212,0.3)]"
                  title="Download Save File"
                >
                  <Download className="w-4 h-4" /> Backup
                </button>
                <button 
                  onClick={handlePrint}
                  className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-cyan-300 px-3 py-2 rounded-lg text-sm font-semibold transition-colors border border-cyan-900/50 hover:border-cyan-500 hover:shadow-[0_0_10px_rgba(6,182,212,0.3)]"
                >
                  <Printer className="w-4 h-4" /> PDF
                </button>
              </div>
            </div>
          </header>

          {/* Toast Notification */}
          {notification && (
            <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-[100] bg-slate-800 text-cyan-300 border border-cyan-500 shadow-[0_0_20px_rgba(6,182,212,0.6)] px-6 py-3 rounded-full font-bold animate-in fade-in slide-in-from-top-4 duration-300 print:hidden flex items-center">
              <Activity className="w-4 h-4 mr-2 animate-pulse" /> {notification}
            </div>
          )}

          {/* Main Content */}
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8 print:hidden">
            
            {/* Left/Top: The Tactical Map */}
            <div className="w-full lg:w-6/12 flex flex-col gap-4">
              <div className="bg-slate-900 border border-cyan-900/30 rounded-xl p-5 shadow-[0_0_15px_rgba(0,0,0,0.5)] relative">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-bold text-slate-100 flex items-center">
                    <Map className="w-5 h-5 mr-2 text-cyan-500" />
                    Tactical Theater
                  </h2>
                </div>
                
                {/* Radar Map Container with Neon SVG Outline */}
                <div className="relative w-full aspect-[4/3] bg-slate-950 border border-cyan-900/40 rounded-lg overflow-hidden p-4 shadow-[inset_0_0_20px_rgba(0,0,0,0.8)]">
                  
                  {/* Neon Map SVG Background */}
                  <svg viewBox="0 0 1000 600" className="absolute inset-0 w-full h-full opacity-60 pointer-events-none drop-shadow-[0_0_10px_rgba(6,182,212,0.8)]">
                    <path d={TACTICAL_OUTLINE_SVG} fill="rgba(6,182,212,0.03)" stroke="#06b6d4" strokeWidth="2" strokeLinejoin="round" />
                  </svg>

                  {/* Grid overlay for tactical feel */}
                  <div className="absolute inset-0 bg-[linear-gradient(rgba(6,182,212,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(6,182,212,0.05)_1px,transparent_1px)] bg-[size:20px_20px] pointer-events-none"></div>

                  {US_STATES.map(state => {
                    const coords = STATE_COORDS[state] || { x: 0, y: 0 };
                    const hasNotes = outreachData[state]?.notes?.trim()?.length > 0;

              </thead>
              <tbody>
                {US_STATES.map(state => {
                  const data = outreachData[state];
                  if (!data) return null;
                  
                  const contactCount = (data.contacts || []).length;
                  const hasData = CATEGORIES.some(cat => data[`${cat.id}_sent`] > 0 || data[`${cat.id}_goal`] > 0) || (data.notes && data.notes.trim() !== '') || contactCount > 0;
                  if (!hasData) return null;

                  return (
                    <tr key={state} className="border-b border-gray-200">
                      <td className="p-2 font-bold">{STATE_NAMES[state]} ({state})</td>
                      <td className="p-2 text-center">{data.airbnb_sent || 0} / {data.airbnb_goal || 0}</td>
                      <td className="p-2 text-center">{data.hotels_sent || 0} / {data.hotels_goal || 0}</td>
                      <td className="p-2 text-center">{data.fnb_sent || 0} / {data.fnb_goal || 0}</td>
                      <td className="p-2 text-center">{data.realestate_sent || 0} / {data.realestate_goal || 0}</td>
                      <td className="p-2 text-center font-bold text-blue-600">{contactCount}</td>
                      <td className="p-2 text-xs text-gray-700 whitespace-pre-wrap">{data.notes || '-'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Expanded Email Modal / Pop-out */}
          {isEmailModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-slate-950/80 backdrop-blur-sm print:hidden">
              <div className="bg-slate-900 w-full max-w-5xl h-[85vh] rounded-xl border border-cyan-500/50 shadow-[0_0_40px_rgba(6,182,212,0.3)] flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
                 <div className="flex justify-between items-center p-5 border-b border-cyan-900/50 bg-slate-950">
                   <h3 className="text-cyan-400 font-bold flex items-center text-lg"><Maximize2 className="w-5 h-5 mr-3"/> Expanded Comms Relay: {STATE_NAMES[selectedState]}</h3>
                   <button onClick={() => setIsEmailModalOpen(false)} className="text-slate-400 hover:text-rose-400 transition-colors bg-slate-800 hover:bg-slate-700 p-2 rounded-md"><X className="w-5 h-5"/></button>
                 </div>
                 
                 <div className="p-6 flex-1 flex flex-col gap-4 bg-slate-950/40">
                   <div className="flex items-center bg-slate-900 border border-slate-700 rounded-md overflow-hidden focus-within:border-cyan-500 focus-within:shadow-[0_0_10px_rgba(6,182,212,0.2)] transition-all">
                      <span className="bg-slate-800 px-4 py-3 text-sm font-bold text-slate-400 border-r border-slate-700">TO:</span>
                      <input 
                        type="text" 
                        value={localStateData.draftTo || ''}
                        onChange={e => handleLocalChange('draftTo', e.target.value)}
                        placeholder="recipient@example.com"
                        className="flex-1 bg-transparent p-3 text-cyan-100 outline-none placeholder-slate-600"
                      />
                    </div>
                    
                    <div className="flex items-center bg-slate-900 border border-slate-700 rounded-md overflow-hidden focus-within:border-cyan-500 focus-within:shadow-[0_0_10px_rgba(6,182,212,0.2)] transition-all">
                      <span className="bg-slate-800 px-4 py-3 text-sm font-bold text-slate-400 border-r border-slate-700">SUBJ:</span>
                      <input 
                        type="text" 
                        value={localStateData.draftSubject || ''}
                        onChange={e => handleLocalChange('draftSubject', e.target.value)}
                        placeholder="Hello Charchee Strategy..."
                        className="flex-1 bg-transparent p-3 text-cyan-100 outline-none placeholder-slate-600"
                      />
                    </div>
                    
                    <textarea 
                      value={localStateData.draftBody || ''}
                      onChange={e => handleLocalChange('draftBody', e.target.value)}
                      className="flex-1 w-full bg-slate-900 border border-slate-700 focus:border-cyan-500 focus:shadow-[0_0_15px_rgba(6,182,212,0.2)] rounded-lg p-5 text-base text-cyan-100 placeholder-slate-600 transition-all resize-none leading-relaxed outline-none"
                      placeholder={`Draft your expanded message for ${STATE_NAMES[selectedState]} here...`}
                    />
                 </div>
                 
                 <div className="p-5 border-t border-cyan-900/50 bg-slate-950 flex flex-col sm:flex-row justify-end gap-4">
                    <button 
                      onClick={() => setIsEmailModalOpen(false)}
                      className="px-6 py-3 rounded-md font-bold text-slate-300 hover:text-white hover:bg-slate-800 transition-all border border-slate-700 hover:border-slate-600"
                    >
                      Save Draft & Close
                    </button>
                    <button 
                      onClick={launchEmailClient}
                      className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-md font-bold transition-all flex items-center justify-center border border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.3)] hover:shadow-[0_0_20px_rgba(59,130,246,0.5)]"
                    >
                      <Send className="w-5 h-5 mr-2" /> Launch Comms
                    </button>
                 </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
